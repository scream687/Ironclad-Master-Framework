name: (Windows) Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Enable long paths in git
      run: git config --global core.longpaths true

    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
        lfs: true

    - name: Verify Tag (Manual Trigger)
      if: github.event_name == 'workflow_dispatch'
      shell: pwsh
      run: |
        $tag = git describe --exact-match --tags HEAD 2>$null
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Error: Current commit is not tagged."
          exit 1
        }
        if ($tag -notmatch '^v\d+\.\d+\.\d+') {
          Write-Error "Error: Current commit tag '$tag' does not match vX.X.X format."
          exit 1
        }
        Write-Host "Found valid tag: $tag"
        echo "VERSION=$($tag -replace '^v','')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "GITHUB_REF=refs/tags/$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    
    - name: Get version from tag
      if: github.event_name != 'workflow_dispatch'
      id: get_version
      shell: pwsh
      run: |
        $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup

    - name: Install SimplySignDesktop
      shell: pwsh
      run: |
        $msiPath = "tools/sign_windows/SimplySignDesktop-9.3.3.71-64-bit-en.msi"
        if (-not (Test-Path $msiPath)) {
            Write-Error "MSI file not found at: $msiPath"
            exit 1
        }

        $absMsiPath = Convert-Path $msiPath
        $logPath = "$PWD\install.log"

        Write-Host "Installing SimplySignDesktop from $absMsiPath..."
        # Use /qn for completely silent installation (no UI) and ALLUSERS=1 to force machine-wide install
        $process = Start-Process msiexec -ArgumentList "/i `"$absMsiPath`" /qn /norestart ALLUSERS=1 /l*v `"$logPath`"" -Wait -PassThru
        
        if ($process.ExitCode -ne 0) {
            Write-Host "SimplySignDesktop installation failed with exit code $($process.ExitCode)"
            if (Test-Path $logPath) {
                Write-Host "----------------------------------------------------------------"
                Write-Host "Install Log Content:"
                Write-Host "----------------------------------------------------------------"
                Get-Content $logPath
                Write-Host "----------------------------------------------------------------"
            } else {
                Write-Host "Log file not found at $logPath"
            }
            exit $process.ExitCode
        }
        Write-Host "SimplySignDesktop installed successfully."

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Workloads
      run: dotnet workload restore src/Everywhere.Windows/Everywhere.Windows.csproj

    - name: Restore
      shell: pwsh
      run: |
        dotnet restore Everywhere.Windows.slnx -r win-x64

    - name: Publish Everywhere.Windows
      shell: pwsh
      env:
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        AI_GATEWAY_BASE_URL: ${{ vars.AI_GATEWAY_BASE_URL }}
        ACCOUNT_BASE_URL: ${{ vars.ACCOUNT_BASE_URL }}
        CLOUD_SYNC_BASE_URL: ${{ vars.CLOUD_SYNC_BASE_URL }}
      run: |
        dotnet publish src/Everywhere.Windows/Everywhere.Windows.csproj `
          -c Release `
          --self-contained true `
          -p:Version="$env:VERSION" `
          -p:SentryDsn="$env:SENTRY_DSN" `
          -p:ClientId="$env:CLIENT_ID" `
          -p:AIGatewayBaseUrl="$env:AI_GATEWAY_BASE_URL" `
          -p:AccountBaseUrl="$env:ACCOUNT_BASE_URL" `
          -p:CloudSyncBaseUrl="$env:CLOUD_SYNC_BASE_URL" `
          -o ./publish `
          --no-restore

    - name: Login, Compile, and Sign
      shell: pwsh
      env:
        SIGN_USERNAME: ${{ secrets.CERTUM_USERNAME }}
        SIGN_OTP_TOKEN: ${{ secrets.CERTUM_OTP_TOKEN }}
      run: |
        python -m pip install --upgrade pip
        pip install pyotp
        python -u tools/sign_and_pack.py ./publish tools/installer.iss

    - name: Create release zip
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./Everywhere-Windows-x64-v$env:VERSION.zip

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v3
      with:
        draft: true
        make_latest: false
        tag_name: v${{ env.VERSION }}
        files: |
          ./Everywhere-Windows-x64-v${{env.VERSION}}.zip
          ./Everywhere-Windows-x64-Setup-v${{env.VERSION}}.exe